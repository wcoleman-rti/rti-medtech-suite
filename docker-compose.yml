      MEDTECH_APP_NAME: "device-telemetry-or3"
    volumes: *config-volumes
    networks:
      - surgical-net
    depends_on:
      cloud-discovery-service:
        condition: service_healthy

  # digital-twin-or3 removed: replaced by unified medtech-gui service above

  # ─── Routing Service (Procedure → Hospital bridge) ───────────────

  routing-service:
    image: rticom/routing-service:7.6.0
    container_name: routing-service
    command:
      - "-cfgFile"
      - "/opt/medtech/config/RoutingService.xml"
      - "-cfgName"
      - "MedtechBridge"
      - "-verbosity"
      - "WARN"
    environment:
      <<: *medtech-env
      NDDS_QOS_PROFILES: "/opt/medtech/share/qos/Snippets.xml;/opt/medtech/share/qos/Patterns.xml;/opt/medtech/share/qos/Topics.xml;/opt/medtech/share/qos/Participants.xml"
    volumes:
      - ./services/routing/RoutingService.xml:/opt/medtech/config/RoutingService.xml:ro
      - ./interfaces/qos:/opt/medtech/share/qos:ro
      - ${RTI_LICENSE_FILE:-./rti_license.dat}:/opt/rti.com/rti_connext_dds-7.6.0/rti_license.dat:ro
