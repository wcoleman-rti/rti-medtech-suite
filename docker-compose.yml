    image: ubuntu:22.04
    container_name: hospital-placeholder
    command: ["sleep", "infinity"]
    environment:
      <<: *medtech-env
    volumes: *qos-volumes
    networks:
      - hospital-net
    depends_on:
      cloud-discovery-service:
        condition: service_healthy
