# Docker Compose configuration for medtech-suite simulation
#
# Usage:
#   docker compose --profile build build             Build all base images
#   docker compose up -d                             Start CDS + placeholders
#   docker compose --profile observability up -d     Start observability stack
#
# Prerequisites:
#   - NDDSHOME set in environment (source rtisetenv before running)
#   - RTI license file: set RTI_LICENSE_FILE in .env (see .env.example)

x-medtech-env: &medtech-env
  NDDS_QOS_PROFILES: "/opt/medtech/share/qos/Snippets.xml;/opt/medtech/share/qos/Patterns.xml;/opt/medtech/share/qos/Topics.xml;/opt/medtech/share/qos/Participants.xml;/opt/medtech/share/domains/Domains.xml;/opt/medtech/share/participants/SurgicalParticipants.xml;/opt/medtech/share/participants/OrchestrationParticipants.xml"
  MEDTECH_TRANSPORT_PROFILE: "Docker"
  NDDS_DISCOVERY_PEERS: "rtps@udpv4://cloud-discovery-service:7400"
  PYTHONPATH: "/opt/medtech/lib/python/site-packages"
  # QoS timing overrides for Docker (non-real-time scheduling).
  # Relaxes deadlines that Docker's OS scheduler cannot guarantee.
  # Both _SEC and _NS must be set as a pair — see Snippets.xml
  # <configuration_variables> for real-time defaults.
  DEADLINE_OPERATOR_INPUT_SEC: "0"
  DEADLINE_OPERATOR_INPUT_NS: "100000000"    # 100 ms (RT: 4 ms)
  DEADLINE_ROBOT_STATE_SEC: "0"
  DEADLINE_ROBOT_STATE_NS: "100000000"       # 100 ms (RT: 20 ms)
  DEADLINE_WAVEFORM_SEC: "0"
  DEADLINE_WAVEFORM_NS: "200000000"          # 200 ms (RT: 40 ms)
  DEADLINE_CAMERA_FRAME_SEC: "0"
  DEADLINE_CAMERA_FRAME_NS: "200000000"      # 200 ms (RT: 66 ms)
  LIFESPAN_OPERATOR_INPUT_SEC: "0"
  LIFESPAN_OPERATOR_INPUT_NS: "100000000"    # 100 ms (RT: 20 ms)

x-qos-volumes: &qos-volumes
  - ./interfaces/qos:/opt/medtech/share/qos:ro
  - ./interfaces/domains:/opt/medtech/share/domains:ro

x-config-volumes: &config-volumes
  - ./interfaces/qos:/opt/medtech/share/qos:ro
  - ./interfaces/domains:/opt/medtech/share/domains:ro
  - ./install/share/participants:/opt/medtech/share/participants:ro
  - ./install/share/resources:/opt/medtech/share/resources:ro
  - ${RTI_LICENSE_FILE:-./rti_license.dat}:/opt/rti.com/rti_connext_dds-7.6.0/rti_license.dat:ro

x-build-args: &build-args
  CONNEXT_VERSION: "7.6.0"
  CONNEXTDDS_ARCH: "x64Linux4gcc8.5.0"

networks:
  surgical-net:
    driver: bridge
  hospital-net:
    driver: bridge

services:

  # ─── Infrastructure ─────────────────────────────────────────────

  cloud-discovery-service:
    image: medtech/cloud-discovery-service
    build:
      context: .
      dockerfile: docker/cloud-discovery-service.Dockerfile
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    container_name: cloud-discovery-service
    command: ["-cfgFile", "/opt/medtech/config/CloudDiscoveryService.xml", "-cfgName", "DockerCDS", "-verbosity", "WARN"]
    volumes:
      - ./services/cloud-discovery-service/CloudDiscoveryService.xml:/opt/medtech/config/CloudDiscoveryService.xml:ro
      - ${RTI_LICENSE_FILE:-./rti_license.dat}:/opt/rti.com/rti_connext_dds-7.6.0/rti_license.dat:ro
    ports:
      - "7400:7400/udp"
    networks:
      surgical-net:
      hospital-net:
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── Base Images (build-only profile) ───────────────────────────

  build-base:
    image: medtech/build-base
    build:
      context: .
      dockerfile: docker/build-base.Dockerfile
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  runtime-cpp:
    image: medtech/runtime-cpp
    build:
      context: .
      dockerfile: docker/runtime-cpp.Dockerfile
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  runtime-python:
    image: medtech/runtime-python
    build:
      context: .
      dockerfile: docker/runtime-python.Dockerfile
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  app-cpp:
    image: medtech/app-cpp
    build:
      context: .
      dockerfile: docker/medtech-app.Dockerfile
      target: cpp-runtime
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  app-python:
    image: medtech/app-python
    build:
      context: .
      dockerfile: docker/medtech-app.Dockerfile
      target: python-runtime
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  # ─── Observability (--profile observability) ────────────────────

  collector-service:
    image: rticom/collector-service:7.6.0
    container_name: collector-service
    profiles: ["observability"]
    environment:
      CFG_NAME: NonSecureLAN
      OBSERVABILITY_DOMAIN: "20"
      OBSERVABILITY_PROMETHEUS_EXPORTER_PORT: "19090"
      OBSERVABILITY_LOKI_HOSTNAME: loki
      OBSERVABILITY_LOKI_EXPORTER_PORT: "3100"
      NDDS_DISCOVERY_PEERS: "rtps@udpv4://cloud-discovery-service:7400"
    volumes:
      - ${RTI_LICENSE_FILE:-./rti_license.dat}:/opt/rti.com/rti_connext_dds-7.6.0/rti_license.dat:ro
    networks:
      hospital-net:
      surgical-net:
    depends_on:
      cloud-discovery-service:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    profiles: ["observability"]
    volumes:
      - ./services/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      hospital-net:

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    profiles: ["observability"]
    ports:
      - "3100:3100"
    networks:
      hospital-net:

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./services/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}/resource/app/app_support/observability/templates/grafana/dashboards/General:/var/lib/grafana/dashboards:ro
    networks:
      hospital-net:
    depends_on:
      - prometheus
      - loki

  # ─── Surgical Procedure Module ──────────────────────────────────

  # ── OR-1 Instance ───────────────────────────────────────────────

  procedure-context-or1:
    image: medtech/app-python
    container_name: procedure-context-or1
    command: ["python", "-m", "surgical_procedure.procedure_context_service"]
    environment:
      <<: *medtech-env
      ROOM_ID: "OR-1"
      PROCEDURE_ID: "OR1-001"
      MEDTECH_APP_NAME: "procedure-context-or1"
    volumes: *config-volumes
    networks:
      - surgical-net
    depends_on:
      cloud-discovery-service:
        condition: service_healthy

  robot-service-host-or1:
    image: medtech/app-cpp
    container_name: robot-service-host-or1
    command: ["/opt/medtech/bin/robot-service-host"]
    environment:
      <<: *medtech-env
      HOST_ID: "robot-host-or1"
      ROBOT_ID: "arm-or1-a"
      ROOM_ID: "OR-1"
      PROCEDURE_ID: "OR1-001"
      MEDTECH_APP_NAME: "robot-service-host-or1"
    volumes: *config-volumes
    networks:
      - surgical-net
    depends_on:
      cloud-discovery-service:
        condition: service_healthy

  robot-service-host-or1-b:
    image: medtech/app-cpp
    container_name: robot-service-host-or1-b
