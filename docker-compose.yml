# Docker Compose configuration for rti-medtech-suite
#
# This file is used ONLY for building Docker images.
# Runtime container orchestration is handled by the medtech CLI:
#   medtech launch          Start the default simulation scenario
#   medtech run hospital    Start a hospital instance
#   medtech run or          Start an OR room instance
#
# Usage:
#   docker compose --profile build build             Build all base images
#
# Prerequisites:
#   - NDDSHOME set in environment (source rtisetenv before running)
#   - RTI license file: set RTI_LICENSE_FILE in .env (see .env.example)

x-medtech-env: &medtech-env
  NDDS_QOS_PROFILES: "/opt/medtech/share/qos/Snippets.xml;/opt/medtech/share/qos/Patterns.xml;/opt/medtech/share/qos/Topics.xml;/opt/medtech/share/qos/Participants.xml;/opt/medtech/share/domains/RoomDatabuses.xml;/opt/medtech/share/domains/HospitalDatabuses.xml;/opt/medtech/share/domains/CloudDatabuses.xml;/opt/medtech/share/participants/SurgicalParticipants.xml;/opt/medtech/share/participants/OrchestrationParticipants.xml;/opt/medtech/share/participants/HospitalParticipants.xml"
  MEDTECH_TRANSPORT_PROFILE: "Docker"
  NDDS_DISCOVERY_PEERS: "rtps@udpv4://cloud-discovery-service:7400"
  PYTHONPATH: "/opt/medtech/lib/python/site-packages"
  # QoS timing overrides for Docker (non-real-time scheduling).
  # Relaxes deadlines that Docker's OS scheduler cannot guarantee.
  # Both _SEC and _NS must be set as a pair — see Snippets.xml
  # <configuration_variables> for real-time defaults.
  DEADLINE_OPERATOR_INPUT_SEC: "0"
  DEADLINE_OPERATOR_INPUT_NS: "100000000"    # 100 ms (RT: 4 ms)
  DEADLINE_ROBOT_STATE_SEC: "0"
  DEADLINE_ROBOT_STATE_NS: "100000000"       # 100 ms (RT: 20 ms)
  DEADLINE_WAVEFORM_SEC: "0"
  DEADLINE_WAVEFORM_NS: "200000000"          # 200 ms (RT: 40 ms)
  DEADLINE_CAMERA_FRAME_SEC: "0"
  DEADLINE_CAMERA_FRAME_NS: "200000000"      # 200 ms (RT: 66 ms)
  LIFESPAN_OPERATOR_INPUT_SEC: "0"
  LIFESPAN_OPERATOR_INPUT_NS: "100000000"    # 100 ms (RT: 20 ms)

x-config-volumes: &config-volumes
  - ./interfaces/qos:/opt/medtech/share/qos:ro
  - ./interfaces/domains:/opt/medtech/share/domains:ro
  - ./install/share/participants:/opt/medtech/share/participants:ro
  - ./install/share/resources:/opt/medtech/share/resources:ro
  - ${RTI_LICENSE_FILE:-./rti_license.dat}:/opt/rti.com/rti_connext_dds-7.6.0/rti_license.dat:ro

x-build-args: &build-args
  CONNEXT_VERSION: "7.6.0"
  CONNEXTDDS_ARCH: "x64Linux4gcc8.5.0"

services:

  # ─── Base Images (build-only profile) ───────────────────────────

  build-base:
    image: medtech/build-base
    build:
      context: .
      dockerfile: docker/build-base.Dockerfile
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  runtime-cpp:
    image: medtech/runtime-cpp
    build:
      context: .
      dockerfile: docker/runtime-cpp.Dockerfile
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  runtime-python:
    image: medtech/runtime-python
    build:
      context: .
      dockerfile: docker/runtime-python.Dockerfile
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  app-cpp:
    image: medtech/app-cpp
    build:
      context: .
      dockerfile: docker/medtech-app.Dockerfile
      target: cpp-runtime
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]

  app-python:
    image: medtech/app-python
    build:
      context: .
      dockerfile: docker/medtech-app.Dockerfile
      target: python-runtime
      additional_contexts:
        connext: "${NDDSHOME:-/opt/rti.com/rti_connext_dds-7.6.0}"
      args:
        <<: *build-args
    profiles: ["build"]
