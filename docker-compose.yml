    volumes: *config-volumes
    networks:
      - surgical-net
    depends_on:
      cloud-discovery-service:
        condition: service_healthy

  medtech-gui:
    image: medtech/app-python
    container_name: medtech-gui
    # CMD default in Dockerfile: python -m medtech.gui.app
    environment:
      <<: *medtech-env
      MEDTECH_NICEGUI_STORAGE_SECRET: "${MEDTECH_NICEGUI_STORAGE_SECRET:-changeme-set-in-env}"
      MEDTECH_APP_NAME: "medtech-gui"
      MEDTECH_GUI_MODE: "${MEDTECH_GUI_MODE:-controller-dashboard}"
    ports:
      - "8080:8080"
    volumes: *config-volumes
    networks:
      - surgical-net
      - hospital-net
    depends_on:
      cloud-discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── OR-3 Instance ───────────────────────────────────────────────

